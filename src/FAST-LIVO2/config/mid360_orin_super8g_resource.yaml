common:
  img_topic: "/left_camera/image"
  lid_topic: "/livox/lidar"
  imu_topic: "/livox/imu"
  img_en: 1
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  # Replace these with your calibrated values.
  extrinsic_T: [0.04165, 0.02326, -0.0284]
  extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]
  Rcl: [0.00610193,-0.999863,-0.0154172,
        -0.00615449,0.0153796,-0.999863,
        0.999962,0.00619598,-0.0060598]
  Pcl: [0.0194384, 0.104689,-0.0251952]

time_offset:
  imu_time_offset: 0.0
  img_time_offset: 0.1
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 2
  filter_size_surf: 0.15
  lidar_type: 1
  scan_line: 4
  blind: 0.8

vio:
  max_iterations: 4
  outlier_threshold: 1000
  img_point_cov: 100
  patch_size: 8
  patch_pyrimid_level: 3
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1

imu:
  imu_en: true
  imu_int_frame: 30
  acc_cov: 0.5
  gyr_cov: 0.3
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001

lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.05
  min_eigen_value: 0.0025
  voxel_size: 0.6
  max_layer: 1
  max_points_num: 40
  layer_init_num: [5, 5, 5, 5, 5]

local_map:
  map_sliding_en: true
  half_map_size: 90
  sliding_thresh: 8

uav:
  imu_rate_odom: false
  gravity_align_en: false

publish:
  dense_map_en: false
  pub_effect_point_en: false
  pub_plane_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0
  vio_publish_en: false
  vio_colorize_en: false
  max_publish_points: 80000
  publish_voxel_leaf_size: 0.08

adaptive_visual_update:
  enable: true
  lidar_degeneracy_threshold: 0.07
  lidar_degeneracy_consecutive_frames: 3
  keyframe_trans_thresh_m: 1.0
  keyframe_rot_thresh_deg: 60.0
  keyframe_scale_gain: 1.0
  keyframe_scale_min: 0.0
  keyframe_scale_max: 1.0
  max_skip_frames: 6
  force_visual_when_degenerate: true

visual_map:
  hybrid_map_en: true
  visual_voxel_size: 0.5
  local_map_edge_length: 200.0
  long_term_map_edge_length: 800.0
  local_map_sliding_thresh: 20.0
  long_term_map_sliding_thresh: 100.0
  local_points_per_voxel: 20
  long_term_points_per_voxel: 2
  max_obs_size_per_point: 12
  compact_long_term_observations: true
  max_long_term_obs_per_point: 1
  max_append_points_normal: 120
  max_append_points_degenerate: 500
  map_stat_log_interval: 20

evo:
  seq_name: "mid360_orin_super8g"
  pose_output_en: false

pcd_save:
  pcd_save_en: false
  type: 0
  colmap_output_en: false
  filter_size_pcd: 0.15
  interval: -1

image_save:
  img_save_en: false
  interval: 1
